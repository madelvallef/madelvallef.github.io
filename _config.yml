title: Miguel Del Valle
first_name: Miguel
middle_name:
last_name: Del Valle
description: >-
  Miguel Del Valle is an economist working in spatial economics, production
  networks, and international trade.
keywords: spatial economics, production networks, international trade, administrative microdata
lang: en
timezone: America/Santiago

# This is a GitHub Pages user site, served from the domain root.
url: https://madelvallef.github.io
baseurl: ""
icon: favicon.svg

theme: al_folio_core
al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  distill:
    engine: distillpub-template
    source: al-org-dev/distill-template#al-folio
    allow_remote_loader: false
  features:
    cv:
      enabled: false
    distill:
      enabled: false
  compat:
    bootstrap:
      enabled: false
  upgrade:
    channel: stable
    auto_apply_safe_fixes: false
plugins:
  - al_folio_core
  - al_folio_upgrade
  - jekyll-email-protect
  - jekyll-minifier
  - jekyll/scholar
  - jekyll-sitemap

include:
  - _pages
exclude:
  - al-folio-upgrade-report.md
  - AGENTS.md
  - CLAUDE.md
  - DESIGN.md
  - PRODUCT.md
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - docs/
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - purgecss.config.js
  - readme_preview/
  - test/
  - vendor/
  - _books/
  - _news/
  - _posts/
  - _projects/
  - _pages/404.md
  - _pages/about_einstein.md
  - _pages/blog.md
  - _pages/books.md
  - _pages/cv.md
  - _pages/dropdown.md
  - _pages/news.md
  - _pages/plugins.md
  - _pages/profiles.md
  - _pages/projects.md
  - _pages/publications.md
  - _pages/repositories.md
  - _pages/teaching.md
keep_files:
  - CNAME
  - .nojekyll

collections: {}

serve_og_meta: true
serve_schema_org: true
og_image: /assets/img/landing-background.webp

scholar:
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  query: "@*"
  group_by: none

external_links:
  enabled: true
  rel: external noopener
  target: _blank

imagemagick:
  enabled: false
lazy_loading_images: false

enable_darkmode: false
enable_cookie_consent: false
enable_math: false
enable_masonry: false
enable_medium_zoom: false
enable_progressbar: false
enable_project_categories: false
enable_tooltips: false
enable_video_embedding: false
search_enabled: false
back_to_top: false
navbar_fixed: false
footer_fixed: false

jekyll-minifier:
  compress_javascript: false
  compress_css: false
  exclude: ["robots.txt"]

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false
