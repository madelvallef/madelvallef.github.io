name: Responsive smoke checks

on:
  pull_request:
    branches: [main]
    paths:
      - "assets/**"
      - "_data/**"
      - "_layouts/**"
      - "_pages/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/visual-regression.yml"
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "_data/**"
      - "_layouts/**"
      - "_pages/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/visual-regression.yml"

jobs:
  responsive-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: JEKYLL_ENV=production bundle exec jekyll build
      - name: Verify responsive source contracts
        run: |
          node --check assets/js/personal.js
          grep -q "@media (max-width: 760px)" assets/css/personal.css
          grep -q "site-header" _site/index.html
