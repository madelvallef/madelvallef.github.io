name: Site checks

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "_data/**"
      - "_layouts/**"
      - "_pages/**"
      - "_bibliography/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "assets/**"
      - "_data/**"
      - "_layouts/**"
      - "_pages/**"
      - "_bibliography/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/unit-tests.yml"

jobs:
  site-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Build production site
        run: JEKYLL_ENV=production bundle exec jekyll build --trace
      - name: Verify key public content
        run: |
          test -f _site/index.html
          grep -q "Miguel Del Valle" _site/index.html
          grep -q "Working Papers" _site/index.html
          grep -q "Teaching" _site/index.html
