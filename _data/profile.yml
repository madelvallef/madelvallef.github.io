name: Miguel Del Valle
role: Economist
bio:
  - >-
    I hold a <strong>Bachelor's and a Master's Degree</strong> from
    <em>Universidad de Chile</em>. My research interests are <strong>spatial
    economics, production networks, and international trade.</strong>
  - >-
    I combine <strong>high-quality data</strong> built from administrative
    microdata, surveys, and international datasets with
    <strong>state-of-the-art general equilibrium quantitative models.</strong>
  - >-
    My work focuses on understanding the <strong>aggregate and distributional
    consequences</strong> of productivity shocks, infrastructure investment,
    natural disasters, and other economic events. I use this evidence to
    inform the design of <strong>better policies</strong> that mitigate welfare
    losses and increase welfare gains.
  - I plan to apply to PhD programs in Economics this year.
research_areas:
  - Spatial Economics
  - Production Networks
  - International Trade
