name: Miguel Del Valle
role: Economist
bio:
  - >-
    I hold a <strong>Bachelor's and a Master's Degree</strong> from
    <em>Universidad de Chile</em>. My research interests are <strong>spatial
    economics, production networks, and international economics.</strong>
  - >-
    I combine <strong>high-quality data</strong> built from administrative
    microdata, surveys, and international datasets with
    <strong>state-of-the-art general equilibrium quantitative models.</strong>
  - >-
    My work focuses on bringing these tools together to design <strong>better
    policies</strong>: policies that mitigate welfare losses, increase welfare
    gains, and respond to productivity shocks, firm entry and exit, natural
    disasters, and other economic disruptions.
  - I plan to pursue a PhD in Economics.
research_areas:
  - Spatial Economics
  - Production Networks
  - International Economics
