name: Miguel Del Valle
role: Economist
bio: >-
  I am an economist with undergraduate and master’s degrees in Economics from
  the University of Chile. My research interests include spatial economics,
  production networks, and international economics. I combine disaggregated
  economic accounts built from administrative microdata, surveys, and
  international datasets with quantitative economic models to study the
  aggregate and distributional effects of policy decisions, productivity shocks,
  firm entry and exit, natural disasters, and other economic disruptions. My
  goal is to inform policies that mitigate welfare losses and increase welfare
  gains. I plan to pursue a PhD in Economics.
research_areas:
  - Spatial Economics
  - Production Networks
  - International Economics
